[tool.ruff.lint.isort]
known-first-party = ["backend", "stockManager"]

[tool.ruff.lint]
select = ["I"]

# ---------------------------------------------------------------------------
# Basedpyright（IDE / CLI）静态类型检查配置
# ---------------------------------------------------------------------------
# 路径相对仓库外层根。Django 包根是内层 stockManager/（含 manage.py）。
# django-stubs 主要为 mypy 插件设计：无插件时 Model 无 .id（用 .pk）、
# Admin 动态属性大量误报，故排除 admin/。
# ---------------------------------------------------------------------------
[tool.basedpyright]
include = ["stockManager/backend", "stockManager/stockManager"]
exclude = [
    "**/__pycache__",
    "**/node_modules",
    "**/staticfiles",
    "**/backup",
    "**/front",
    "**/migrations",
    "**/dist",
    "**/build",
    "**/admin",
]
extraPaths = ["stockManager"]
pythonVersion = "3.13"
pythonPlatform = "All"
venvPath = "."
venv = ".venv"

typeCheckingMode = "standard"
reportImplicitRelativeImport = "error"
reportMissingImports = "error"
reportOperatorIssue = "error"
